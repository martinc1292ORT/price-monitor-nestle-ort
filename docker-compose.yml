version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: price_monitor_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: price_monitor
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d price_monitor']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: price_monitor_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: price_monitor_backend
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/price_monitor
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
    env_file:
      - .env
    volumes:
      - ./backend/evidence:/app/evidence
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: price_monitor_frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
